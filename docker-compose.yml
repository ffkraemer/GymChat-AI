services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: gymchatai-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "UP01wnFfnVoby5Kb"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - gymchatai-sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"UP01wnFfnVoby5Kb\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  gymchatai-sqldata: